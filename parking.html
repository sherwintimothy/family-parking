<!DOCTYPE html>
<html>
<head>

<title>Car Parking Finder</title>

<style>

body{
font-family:Arial;
text-align:center;
}

.row{
margin:10px;
}

.space{
width:25px;
height:25px;
background:#ddd;
display:inline-block;
margin:2px;
cursor:pointer;
}

.parked{
background:red;
}

</style>

</head>

<body>

<h2>Parking Grid</h2>
<p>Tap where you parked</p>

<div id="parking"></div>

<h3 id="result"></h3>

<button onclick="clearParking()">Clear Parking</button>

<script>

let rows = ["Front","A","B","C","D","Back"];
let spaces = 30;

let parkingDiv = document.getElementById("parking");

rows.forEach((row,rowIndex)=>{

let rowDiv=document.createElement("div");
rowDiv.className="row";

let label=document.createElement("div");
label.innerHTML="<b>Row "+row+"</b>";

rowDiv.appendChild(label);

for(let i=1;i<=spaces;i++){

let space=document.createElement("div");
space.className="space";

space.onclick=()=>{

localStorage.setItem("row",row);
localStorage.setItem("spot",i);

render();
};

rowDiv.appendChild(space);
}

parkingDiv.appendChild(rowDiv);

});

function render(){

let savedRow=localStorage.getItem("row");
let savedSpot=localStorage.getItem("spot");

let allSpaces=document.querySelectorAll(".space");
allSpaces.forEach(space=>space.classList.remove("parked"));

if(savedRow){

let rowIndex=rows.indexOf(savedRow);
let index=rowIndex*spaces+(savedSpot-1);

allSpaces[index].classList.add("parked");

document.getElementById("result").innerText =
"🚗 Parked at Row "+savedRow+" Space "+savedSpot;

}

}

function clearParking(){

localStorage.clear();
render();
document.getElementById("result").innerText="Parking cleared";

}

render();

</script>

</body>
</html>
